tags:
  - Culture / Explore
summary: Mengambil semua data tempat budaya (Sederhana)
description: Menyajikan daftar singkat seluruh objek budaya dan sejarah Tegal untuk pemetaan di peta atau UI statis.
security:
  - Bearer: []
responses:
  200:
    description: Berhasil mengambil data budaya
    schema:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: d3b07384-d113-4ec6-a5cc-91e3e4d9c4d8
              title:
                type: string
                example: Klenteng Tek Hay Kiong
              subtitle:
                type: string
                example: Simbol Toleransi & Akulturasi
              category:
                type: string
                example: Tradisi
              image:
                type: string
                example: 177196762_1.png
              latitude:
                type: number
                format: float
                example: -6.8642
              longitude:
                type: number
                format: float
                example: 109.1384
  401:
    description: Otorisasi Token gagal