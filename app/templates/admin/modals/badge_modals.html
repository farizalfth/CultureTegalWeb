<div class="modal fade" id="addBadgeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Daftarkan Lencana Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="{{ url_for('admin_bp.add_badge') }}" method="POST" enctype="multipart/form-data">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nama Lencana Misi</label>
                        <input type="text" name="nama_badge" class="form-control rounded-3" placeholder="Contoh: Kelelawar Malam" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Poin Reward (Didapatkan)</label>
                        <input type="number" name="syarat_poin" class="form-control rounded-3" placeholder="Contoh: 50" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Icon Lencana (PNG)</label>
                        <input type="file" name="badge_image" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold">Deskripsi Misi</label>
                        <textarea name="deskripsi" class="form-control rounded-3" rows="3" required></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="submit" class="btn btn-primary w-100 rounded-3 py-2">Simpan Lencana</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editBadgeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Perbarui Lencana Misi</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editBadgeForm" method="POST" enctype="multipart/form-data">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nama Lencana Misi</label>
                        <input type="text" name="nama_badge" id="edit_badge_nama" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Poin Reward (Didapatkan)</label>
                        <input type="number" name="syarat_poin" id="edit_badge_poin" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Ubah Icon (Opsional)</label>
                        <input type="file" name="badge_image" class="form-control rounded-3">
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold">Deskripsi Misi</label>
                        <textarea name="deskripsi" id="edit_badge_desc" class="form-control rounded-3" rows="3" required></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="submit" class="btn btn-warning w-100 rounded-3 py-2 fw-bold text-white">Update Lencana</button>
                </div>
            </form>
        </div>
    </div>
</div>
