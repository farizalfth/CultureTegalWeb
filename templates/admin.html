<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Tegal Culture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #D35400; --dark: #2c3e50; --sidebar-w: 260px; }
        body { background-color: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Sidebar Styling */
        .sidebar { width: var(--sidebar-w); height: 100vh; position: fixed; background: var(--dark); color: white; transition: 0.3s; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); padding: 15px 25px; border-radius: 0; transition: 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--primary); }
        
        /* Main Content */
        .main-content { margin-left: var(--sidebar-w); padding: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .stat-card { border: none; border-radius: 20px; transition: 0.3s; background: white; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .stat-card:hover { transform: translateY(-5px); }
        .icon-box { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-4 text-center border-bottom border-secondary mb-3">
            <h5 class="fw-bold m-0 text-white">TC ADMIN</h5>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#"><i class="fa fa-home me-3"></i> Ringkasan</a>
            <a class="nav-link" href="#"><i class="fa fa-landmark me-3"></i> Kelola Budaya</a>
            <a class="nav-link" href="#"><i class="fa fa-calendar me-3"></i> Kelola Event</a>
            <a class="nav-link" href="#"><i class="fa fa-shopping-bag me-3"></i> Kelola UMKM</a>
            <div class="mt-auto p-4">
                <a href="/logout" class="btn btn-outline-light w-100 rounded-pill"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h3 class="fw-bold">Dashboard Overview</h3>
            <div class="d-flex align-items-center">
                <span class="me-3">Selamat Datang, <b>{{ session['username'] }}</b></span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=D35400&color=fff" class="rounded-circle" width="40" alt="Admin Avatar">
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card d-flex align-items-center">
                    <div class="icon-box bg-primary text-white me-3"><i class="fa fa-landmark"></i></div>
                    <div><h6 class="text-muted m-0">Total Budaya</h6><h4 class="fw-bold m-0">24</h4></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card d-flex align-items-center">
                    <div class="icon-box bg-success text-white me-3"><i class="fa fa-users"></i></div>
                    <div><h6 class="text-muted m-0">Pengunjung</h6><h4 class="fw-bold m-0">1.2k</h4></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card d-flex align-items-center">
                    <div class="icon-box bg-warning text-white me-3"><i class="fa fa-star"></i></div>
                    <div><h6 class="text-muted m-0">Review</h6><h4 class="fw-bold m-0">86</h4></div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="p-4 border-bottom bg-white d-flex justify-content-between align-items-center">
                <h5 class="fw-bold m-0">Tabel Kelola Data</h5>
                <button class="btn btn-primary px-4 rounded-pill btn-sm">+ Tambah Data</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover m-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nama Budaya</th>
                            <th>Kategori</th>
                            <th class="text-end pe-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for b in budaya %}
                        <tr>
                            <td class="ps-4">#{{ b.id }}</td>
                            <td class="fw-semibold">{{ b.nama }}</td>
                            <td><span class="badge bg-light text-dark border">{{ b.kategori }}</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-light"><i class="fa fa-edit text-primary"></i></button>
                                <button class="btn btn-sm btn-light"><i class="fa fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
